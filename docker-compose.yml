services:
  marzban:
    build:
      context: .
      dockerfile: Dockerfile.marzban
    container_name: marzban
    restart: always
    env_file:
      - marzban.env
    environment:
      - UVICORN_HOST=0.0.0.0
      - SQLALCHEMY_DATABASE_URL=sqlite:////var/lib/marzban/db.sqlite3
      - XRAY_JSON=/var/lib/marzban/xray_config.json
      - UVICORN_SSL_CERTFILE=/etc/letsencrypt/live/vpvks.ru/fullchain.pem
      - UVICORN_SSL_KEYFILE=/etc/letsencrypt/live/vpvks.ru/privkey.pem
    network_mode: host
    volumes:
      - /var/lib/marzban:/var/lib/marzban
      - /etc/letsencrypt:/etc/letsencrypt:ro
    mem_limit: 512m
    mem_reservation: 256m
    ulimits:
      nofile:
        soft: 16384
        hard: 32768
      nproc:
        soft: 512
        hard: 1024

  postgres:
    image: postgres:17-alpine
    container_name: vpn_postgres
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: ${PGDATA}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vpn_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c shared_buffers=128MB
      -c effective_cache_size=512MB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
    shm_size: 256mb
    mem_limit: 256m
    mem_reservation: 128m
    ulimits:
      nofile:
        soft: 8192
        hard: 16384
      nproc:
        soft: 256
        hard: 512

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: vpn_pgbouncer
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      POOL_MODE: ${POOL_MODE}
      MAX_CLIENT_CONN: ${MAX_CLIENT_CONN}
      DEFAULT_POOL_SIZE: ${DEFAULT_POOL_SIZE}
      ADMIN_USERS: ${ADMIN_USERS}
      AUTH_TYPE: ${AUTH_TYPE}
      IGNORE_STARTUP_PARAMETERS: ${IGNORE_STARTUP_PARAMETERS}
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vpn_network
    mem_limit: 32m
    mem_reservation: 16m
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=vp62RofV5h pg_isready -h localhost -U vpn_bot_user -d vpn_bot_db -p 5432"]
      interval: 5s
      timeout: 3s
      retries: 5
    ulimits:
      nofile:
        soft: 8192
        hard: 16384
      nproc:
        soft: 256
        hard: 512

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vpn_backend
    command: >
      gunicorn
      --bind 0.0.0.0:8080
      --workers 2
      --threads 2
      --timeout 120
      --keep-alive 5
      server:app
    ports:
      - "127.0.0.1:8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
    env_file:
      - .env
    environment:
      PORT: ${PORT}
      DATABASE_URL: ${DATABASE_URL}
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY}
      YOOKASSA_TEST_MODE: ${YOOKASSA_TEST_MODE}
      YOOKASSA_RETURN_URL: ${YOOKASSA_RETURN_URL}
      SECRET_KEY: ${SECRET_KEY}
      MARZBAN_URL: ${MARZBAN_URL}
      MARZBAN_PUBLIC_URL: ${MARZBAN_PUBLIC_URL}
      MARZBAN_ADMIN: ${MARZBAN_ADMIN}
      MARZBAN_PASSWORD: ${MARZBAN_PASSWORD}
    depends_on:
      pgbouncer:
        condition: service_healthy
    networks:
      - vpn_network
    mem_limit: 256m
    mem_reservation: 128m
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    ulimits:
      nofile:
        soft: 8192
        hard: 16384
      nproc:
        soft: 256
        hard: 512

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: vpn_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      BACKEND_URL: ${BACKEND_URL}
      ADMIN_USER_IDS: ${ADMIN_USER_IDS}
      DATABASE_URL: ${DATABASE_URL}
      MINI_APP_URL: ${MINI_APP_URL}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - vpn_network
    mem_limit: 96m
    mem_reservation: 48m
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python3 main.py' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    ulimits:
      nofile:
        soft: 8192
        hard: 16384
      nproc:
        soft: 256
        hard: 512

networks:
  vpn_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local