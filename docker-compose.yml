services:
  nginx:
    image: nginx:alpine
    container_name: vpn_nginx
    restart: always
    network_mode: host
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - marzban
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M
        reservations:
          cpus: '0.05'
          memory: 32M

  marzban:
    build:
      context: .
      dockerfile: Dockerfile.marzban
    container_name: marzban
    restart: always
    env_file:
      - marzban.env
    environment:
      - UVICORN_HOST=0.0.0.0
      - SQLALCHEMY_DATABASE_URL=sqlite:////var/lib/marzban/db.sqlite3
      - XRAY_JSON=/var/lib/marzban/xray_config.json
    network_mode: host
    volumes:
      - /var/lib/marzban:/var/lib/marzban
      - /etc/letsencrypt:/etc/letsencrypt:ro
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 384M
        reservations:
          cpus: '0.5'
          memory: 192M
    ulimits:
      nofile:
        soft: 16384
        hard: 32768
      nproc:
        soft: 512
        hard: 1024

  postgres:
    image: postgres:17-alpine
    container_name: vpn_postgres
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: ${PGDATA}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vpn_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=all
      -c pg_stat_statements.max=1000
      -c log_min_duration_statement=100
      -c shared_buffers=128MB
      -c effective_cache_size=512MB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
    shm_size: 256mb
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 192M
        reservations:
          cpus: '0.2'
          memory: 96M
    ulimits:
      nofile:
        soft: 8192
        hard: 16384
      nproc:
        soft: 256
        hard: 512

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: vpn_pgbouncer
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      POOL_MODE: ${POOL_MODE}
      MAX_CLIENT_CONN: ${MAX_CLIENT_CONN}
      DEFAULT_POOL_SIZE: ${DEFAULT_POOL_SIZE}
      ADMIN_USERS: ${ADMIN_USERS}
      AUTH_TYPE: ${AUTH_TYPE}
      IGNORE_STARTUP_PARAMETERS: ${IGNORE_STARTUP_PARAMETERS}
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vpn_network
    deploy:
      resources:
        limits:
          cpus: '0.05'
          memory: 24M
        reservations:
          cpus: '0.02'
          memory: 12M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U $POSTGRES_USER -d $POSTGRES_DB -p 5432"]
      interval: 5s
      timeout: 3s
      retries: 5
    ulimits:
      nofile:
        soft: 8192
        hard: 16384
      nproc:
        soft: 256
        hard: 512

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vpn_backend
    command: >
      sh -c "gunicorn --bind 0.0.0.0:8080 --workers 3 --threads 1 --timeout 60 --keep-alive 5 --graceful-timeout 30 server:app & while true; do python scripts/cleanup_logs.py 30; sleep 86400; done"
    ports:
      - "127.0.0.1:8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
    env_file:
      - .env
    environment:
      PORT: ${PORT}
      DATABASE_URL: ${BACKEND_DATABASE_URL:-postgresql://vpn_bot_user:vp62RofV5h@pgbouncer:5432/vpn_bot_db}
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY}
      YOOKASSA_TEST_MODE: ${YOOKASSA_TEST_MODE}
      YOOKASSA_RETURN_URL: ${YOOKASSA_RETURN_URL}
      SECRET_KEY: ${SECRET_KEY}
      MARZBAN_URL: ${MARZBAN_URL:-http://host.docker.internal:8000}
      MARZBAN_PUBLIC_URL: ${MARZBAN_PUBLIC_URL:-https://delron.ru}
      MARZBAN_ADMIN: ${MARZBAN_ADMIN:-admin}
      MARZBAN_PASSWORD: ${MARZBAN_PASSWORD:-j8X0EcIllDwPK}
    depends_on:
      pgbouncer:
        condition: service_healthy
    networks:
      - vpn_network
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 192M
        reservations:
          cpus: '0.15'
          memory: 96M
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    ulimits:
      nofile:
        soft: 8192
        hard: 16384
      nproc:
        soft: 256
        hard: 512

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: vpn_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      BACKEND_URL: ${BACKEND_URL}
      ADMIN_USER_IDS: ${ADMIN_USER_IDS}
      DATABASE_URL: ${DATABASE_URL}
      MINI_APP_URL: ${MINI_APP_URL}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - vpn_network
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M
        reservations:
          cpus: '0.05'
          memory: 32M
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python3 main.py' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    ulimits:
      nofile:
        soft: 8192
        hard: 16384
      nproc:
        soft: 256
        hard: 512

networks:
  vpn_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local