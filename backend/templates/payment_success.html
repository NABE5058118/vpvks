<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Оплата</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .spinner {
            width: 60px;
            height: 60px;
            margin: 0 auto 20px;
            border: 4px solid rgba(0, 238, 255, 0.2);
            border-top-color: #00eeff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        h1 {
            color: #fff;
            font-size: 20px;
            margin-bottom: 10px;
        }

        p {
            color: #888;
            font-size: 14px;
            line-height: 1.5;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
        }

        .status.success {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid rgba(76, 175, 80, 0.5);
        }

        .status.pending {
            background: rgba(255, 193, 7, 0.2);
            border: 1px solid rgba(255, 193, 7, 0.5);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(135deg, #0088cc, #0066aa);
            color: white;
            padding: 16px 32px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-top: 20px;
            width: 100%;
        }

        .btn:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner" id="spinner"></div>
        <h1 id="title">Проверка оплаты...</h1>
        <p id="message">Пожалуйста, подождите</p>
        
        <div id="status-container"></div>
        
        <button class="btn" id="backBtn" onclick="returnToBot()" style="display: none;">
            ← Вернуться в бот
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const userId = tg.initDataUnsafe?.user?.id;
        const urlParams = new URLSearchParams(window.location.search);
        const paymentId = urlParams.get('payment_id');

        async function checkPaymentStatus() {
            if (!paymentId) {
                document.getElementById('title').textContent = 'Ошибка';
                document.getElementById('message').textContent = 'ID платежа не найден';
                document.getElementById('backBtn').style.display = 'flex';
                return;
            }

            try {
                const response = await fetch(`/api/payment/check/${paymentId}`);
                const data = await response.json();

                if (data.payment_info) {
                    const status = data.payment_info.status;
                    
                    if (status === 'succeeded') {
                        document.getElementById('spinner').style.display = 'none';
                        document.getElementById('title').textContent = '✅ Оплата прошла успешно!';
                        document.getElementById('message').textContent = 'Подписка активирована';
                        document.getElementById('status-container').innerHTML = `
                            <div class="status success">
                                <p style="color: #4CAF50; font-weight: 600;">Статус: ${status}</p>
                                <p style="color: #fff; margin-top: 5px;">Сумма: ${data.payment_info.amount} ${data.payment_info.currency}</p>
                            </div>
                        `;
                        document.getElementById('backBtn').style.display = 'flex';
                    } else if (status === 'pending' || status === 'waiting_for_capture') {
                        document.getElementById('title').textContent = '⏳ Ожидание оплаты';
                        document.getElementById('message').textContent = 'Платёж обрабатывается...';
                        setTimeout(checkPaymentStatus, 3000);
                    } else {
                        document.getElementById('spinner').style.display = 'none';
                        document.getElementById('title').textContent = 'Статус: ' + status;
                        document.getElementById('backBtn').style.display = 'flex';
                    }
                }
            } catch (error) {
                document.getElementById('title').textContent = 'Ошибка проверки';
                document.getElementById('message').textContent = error.message;
                document.getElementById('backBtn').style.display = 'flex';
            }
        }

        function returnToBot() {
            tg.close();
        }

        // Start checking
        checkPaymentStatus();
    </script>
</body>
</html>
