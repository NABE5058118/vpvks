<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата успешна | VPVKS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            animation: scaleIn 0.5s ease-out;
        }
        .success-icon::after {
            content: '✓';
            font-size: 40px;
            color: white;
            font-weight: bold;
        }
        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .payment-id {
            color: #888;
            font-size: 12px;
            margin-bottom: 30px;
            font-family: monospace;
        }
        .message {
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-decoration: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 16px;
            transition: transform 0.3s, box-shadow 0.3s;
            margin: 10px 5px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        .countdown {
            margin-top: 30px;
            color: #888;
            font-size: 14px;
        }
        .countdown-bar {
            width: 100%;
            height: 4px;
            background: #f0f0f0;
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }
        .countdown-progress {
            height: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            width: 100%;
            transition: width 1s linear;
        }
        @keyframes scaleIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon"></div>
        <h1>✅ Оплата успешна!</h1>
        <p class="payment-id" id="paymentId"></p>
        <p class="message">
            Спасибо за оплату! Ваша подписка активирована.<br><br>
            Перейдите в Telegram-бот для получения ключа доступа.
        </p>
        
        <a href="https://t.me/relatevpnbot" class="btn">
            🚀 Открыть бот
        </a>
        <br>
        <a href="/miniapp" class="btn btn-secondary">
            📱 Открыть Mini App
        </a>
        
        <div class="countdown">
            Автоматический переход через <span id="seconds">5</span> сек...
            <div class="countdown-bar">
                <div class="countdown-progress" id="progress"></div>
            </div>
        </div>
    </div>

    <script>
        // Get payment ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const paymentId = urlParams.get('payment_id');
        if (paymentId) {
            document.getElementById('paymentId').textContent = 'Payment ID: ' + paymentId;
        }

        // Countdown and redirect
        let seconds = 5;
        const secondsEl = document.getElementById('seconds');
        const progressEl = document.getElementById('progress');

        const countdown = setInterval(() => {
            seconds--;
            secondsEl.textContent = seconds;
            progressEl.style.width = (seconds / 5 * 100) + '%';

            if (seconds <= 0) {
                clearInterval(countdown);
                window.location.href = 'https://t.me/relatevpnbot';
            }
        }, 1000);
    </script>
</body>
</html>
